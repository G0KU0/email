<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SzabyMail</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #252525; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #28a745; color: white; }
        .email { background: #333; padding: 12px; margin-top: 10px; border-radius: 6px; border-left: 3px solid #007bff; }
        #view-inbox { display: none; }
    </style>
</head>
<body>

    <div class="card" id="view-auth">
        <h1 style="text-align:center;">SzabyMail @</h1>
        <input type="text" id="u" placeholder="Felhasználónév (pl: szaby)">
        <input type="password" id="p" placeholder="Jelszó">
        <button class="primary" onclick="doAuth('/api/login')">BELÉPÉS</button>
        <button class="secondary" onclick="doAuth('/api/register')">REGISZTRÁCIÓ</button>
    </div>

    <div class="card" id="view-inbox">
        <h2 id="addr-display"></h2>
        <button onclick="load()" style="background:#444; color:white;">FRISSÍTÉS</button>
        <div id="list"></div>
        <button onclick="location.reload()" style="background:#c0392b; color:white; margin-top:20px;">KIJELENTKEZÉS</button>
    </div>

    <script>
        let token = "";
        async function doAuth(url) {
            const r = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('u').value, password: document.getElementById('p').value})
            });
            const d = await r.json();
            if(d.token) {
                token = d.token;
                document.getElementById('addr-display').innerText = d.email;
                document.getElementById('view-auth').style.display = 'none';
                document.getElementById('view-inbox').style.display = 'block';
                load();
            } else { alert(d.message || d.error); }
        }

        async function load() {
            const r = await fetch('/api/inbox', { headers: {'Authorization': token} });
            const emails = await r.json();
            const list = document.getElementById('list');
            list.innerHTML = emails.length ? "" : "Nincs levél.";
            emails.forEach(e => {
                list.innerHTML += `<div class="email">
                    <small>Feladó: ${e.from}</small><br>
                    <strong>${e.subject}</strong>
                    <p>${e.body}</p>
                </div>`;
            });
        }
    </script>
</body>
</html>
