<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SzabyMail</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .blue { background: #007bff; color: white; }
        .green { background: #28a745; color: white; }
        .email { background: #2a2a2a; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 4px solid #007bff; }
        #inbox-section { display: none; }
    </style>
</head>
<body>

    <div class="box" id="auth-section">
        <h1 style="text-align:center;">SzabyMail</h1>
        <input type="text" id="user" placeholder="Felhasználónév">
        <input type="password" id="pass" placeholder="Jelszó">
        <button class="blue" onclick="auth('/api/login')">BELÉPÉS</button>
        <button class="green" onclick="auth('/api/register')">REGISZTRÁCIÓ</button>
    </div>

    <div class="box" id="inbox-section">
        <h2>Szia, <span id="my-email" style="color:#007bff;"></span>!</h2>
        <button onclick="load()" style="background:#444; color:white;">FRISSÍTÉS</button>
        <div id="list"></div>
        <button onclick="location.reload()" style="background:red; color:white; margin-top:20px;">KIJELENTKEZÉS</button>
    </div>

    <script>
        let token = "";
        async function auth(url) {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('user').value, password: document.getElementById('pass').value})
            });
            const data = await res.json();
            if(data.token) {
                token = data.token;
                document.getElementById('my-email').innerText = data.email;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('inbox-section').style.display = 'block';
                load();
            } else { alert(data.message || data.error); }
        }

        async function load() {
            const res = await fetch('/api/inbox', { headers: {'Authorization': token} });
            const emails = await res.json();
            const container = document.getElementById('list');
            container.innerHTML = emails.length ? "" : "<p>Nincs levél.</p>";
            emails.forEach(e => {
                container.innerHTML += `<div class="email">
                    <small>Kitől: ${e.from}</small><br>
                    <strong>${e.subject}</strong>
                    <p>${e.body}</p>
                </div>`;
            });
        }
    </script>
</body>
</html>
